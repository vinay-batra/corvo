  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(201,168,76,0.04)" stroke-width="1"/>
  <!-- Corner accents -->
  <line x1="80" y1="80" x2="140" y2="80" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
  <line x1="80" y1="80" x2="80" y2="140" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
  <line x1="1120" y1="80" x2="1060" y2="80" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
  <line x1="1120" y1="80" x2="1120" y2="140" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
  <line x1="80" y1="550" x2="140" y2="550" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
