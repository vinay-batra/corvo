  <text x="600" y="258" font-family="Space Mono, monospace" font-size="88" font-weight="700" fill="#c9a84c" text-anchor="middle" letter-spacing="20">CORVO</text>
  <text x="600" y="320" font-family="Space Mono, monospace" font-size="16" font-weight="400" fill="rgba(232,224,204,0.35)" text-anchor="middle" letter-spacing="6">PORTFOLIO INTELLIGENCE</text>
